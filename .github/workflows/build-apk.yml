name: Build Android APK
on:
  workflow_dispatch: {}
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Debug JDK and Android SDK
        run: |
          echo "JAVA_HOME: $JAVA_HOME"
          java -version
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          cat <<EOF > ~/.bubblewrap/config.json
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF
          echo "Bubblewrap configuration initialized successfully:"
          cat ~/.bubblewrap/config.json
      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=Animato, OU=Studio, O=Animato, L=Cloud, S=Cloud, C=US"
      - name: Verify Keystore
        run: |
          ls -la
          test -f android.keystore && echo "Keystore exists!"
      - name: Generate Checksum and Update Project
        run: |
          # Calculate twa-manifest.json's SHA-1 hash and write to manifest-checksum.txt
          # This prevents the interactive "No checksum file was found... would you like to regenerate your project?" prompt
          sha1sum twa-manifest.json | cut -d' ' -f1 > manifest-checksum.txt
          echo "Generated manifest-checksum.txt with content: $(cat manifest-checksum.txt)"
          # Run bubblewrap update to generate/update the native Android project structure non-interactively
          bubblewrap update --skipVersionUpgrade
      - name: Build APK
        run: |
          bubblewrap build --manifest twa-manifest.json --signingKeyPath android.keystore --signingKeyAlias android --signingKeyPassword password --signingKeyKeyPassword password --skipPwaValidation
      - name: Rename APK
        run: |
          mv *.apk game-release.apk
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          files: game-release.apk
          generate_release_notes: true
